theme: jekyll-theme-cayman
title: Tripee API Documentation
description: Documentação oficial da API de integração Tripee para gerenciamento de solicitações de transporte

# GitHub Pages Configuration
baseurl: ""
url: ""

# Build settings
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge

# Navigation
navigation:
  - title: Home
    url: /
  - title: Autenticação
    url: /docs/authentication
  - title: Criação de Solicitações
    url: /docs/trip-creation
  - title: Exemplos
    url: /docs/examples

# Plugins
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

# Exclude from processing
exclude:
  - README.md
  - node_modules/
  - vendor/
