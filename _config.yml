title: Tripee API Documentation
description: Documentação oficial da API de integração Tripee para gerenciamento de solicitações de transporte

# GitHub Pages Configuration
baseurl: ""
url: ""

# Build settings
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge
  auto_ids: true

# Plugins
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

# Exclude from processing
exclude:
  - README.md
  - SETUP_GUIDE.md
  - node_modules/
  - vendor/

# Defaults
defaults:
  - scope:
      path: ""
    values:
      layout: default
