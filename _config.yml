title: Simcorpi integration with Tripee - API Documentation
description: Documentação oficial da API do Simcorpi para integração da Tripee para gerenciamento de solicitações de transporte

# GitHub Pages Configuration
# ⚠️ IMPORTANTE: A barra / no início do baseurl é obrigatória!
baseurl: "/simcorpi-tripee_docs"
url: "https://7itec.github.io"

# Build settings
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge
  auto_ids: true
  parse_block_html: true

# Plugins
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

# Exclude from processing
exclude:
  - README.md
  - SETUP_GUIDE.md
  - node_modules/
  - vendor/

# Defaults
defaults:
  - scope:
      path: ""
    values:
      layout: default
